version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pokedex-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: "http://localhost,http://localhost:80,http://localhost:5173"
      REDIS_URL: redis://redis:6379
      POKEAPI_BASE_URL: https://pokeapi.co/api/v2
      POKEAPI_TIMEOUT: 10000
      CACHE_MAX_ENTRIES: 500
      CACHE_TTL_SECONDS: 3600
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 100
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pokedex-net

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pokedex-net

networks:
  pokedex-net:
    driver: bridge
